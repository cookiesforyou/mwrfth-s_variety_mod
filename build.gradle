plugins {
    id 'net.neoforged.moddev' version '1.0.21'
}

version = '1.0.0'
group = 'net.mwrfths_variety_mod'

base {
    archivesName = 'mwrfths_variety_mod'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = "21.1.172"

    runs {
        client {
            client()
        }
        server {
            server()
        }
    }

    mods {
        mwrfths_variety_mod {
            sourceSet sourceSets.main
        }
    }
}
